<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación 285 | Alojamiento en Puerto Iguazú</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #25D366; 
            --dark: #121212;
            --light: #f8f9fa;
            --text: #333;
            --accent: #d4af37; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            color: var(--text);
            background-color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero & Slider con transiciones suaves */
        .hero-container {
            position: relative;
            height: 85vh;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
            z-index: -1;
        }

        .slide.active { 
            opacity: 1; 
            transform: scale(1);
        }

        .hero-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.65));
            z-index: -1;
        }

        .badge-descuento {
            background-color: var(--accent);
            color: var(--dark);
            padding: 6px 18px;
            font-weight: 700;
            border-radius: 50px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 4px 25px rgba(212, 175, 55, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        }

        .hero-container h1 {
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.6);
        }

        .hero-container p {
            font-size: 1.3rem;
            max-width: 700px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
            font-weight: 300;
        }

        /* Barra de Reservas con efecto de brillo */
        .booking-bar {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 850px;
            width: 90%;
            margin: -50px auto 0;
            position: relative;
            z-index: 10;
            color: var(--dark);
        }

        .input-group {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
        }

        .btn-buscar {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            align-self: flex-end;
            height: 50px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-buscar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
        }

        /* Contenedor */
        .container {
            max-width: 1050px;
            margin: 90px auto 60px;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            font-weight: 700;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--accent);
            margin: 12px auto 0;
            border-radius: 2px;
        }

        /* Tarjetas de Características Interactiva */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 70px;
        }

        .feature-card {
            background: var(--light);
            padding: 35px 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.06);
            background: #fff;
        }

        .feature-card i {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 18px;
            transition: transform 0.3s;
        }

        .feature-card:hover i {
            transform: scale(1.1);
        }

        /* 📸 EFECTO HOVER PRO EN EL ÁLBUM DE FOTOS */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 70px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.07);
            height: 250px;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-label {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: white;
            padding: 20px 15px;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        /* Al pasar el mouse, la foto toma vida */
        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .gallery-item:hover img {
            transform: scale(1.12);
        }

        .gallery-item:hover .gallery-label {
            color: var(--accent);
            padding-bottom: 25px;
        }

        /* 🟢 BOTÓN WHATSAPP VIVO Y LLAMATIVO (Flotante Fijo) */
        .btn-whatsapp-flotante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 999;
            text-decoration: none;
            animation: whatsappAlert 3s infinite ease-in-out;
            transition: transform 0.3s;
        }

        .btn-whatsapp-flotante:hover {
            transform: scale(1.1) rotate(10deg);
        }

        /* Animación combinada de vibración + pulso de onda */
        @keyframes whatsappAlert {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
            10% { transform: scale(1.1) rotate(-8deg); }
            20% { transform: scale(1.1) rotate(8deg); }
            30% { transform: scale(1.1) rotate(-4deg); }
            40% { transform: scale(1.1) rotate(0deg); box-shadow: 0 4px 30px rgba(37, 211, 102, 0.7); }
            60% { transform: scale(1); }
        }

        /* Interfaz Lightbox */
        .lightbox {
            display: none;
            position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
